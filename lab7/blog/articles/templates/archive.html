{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Архив всех статей</title>
    <link rel="stylesheet" href="{% static 'css/article.css' %}">
</head>
<body class="archive">
    <div class="header">
        <h1>Django public blog</h1>
    </div>

    <div class="archive">
        <a href="/article/new/">+ Новая статья</a>

        {% for post in posts %}
            <div class="one-post">
                <h2 class="post-title"><a href="/article/{{ post.id }}/">{{ post.title }}</a></h2>
                <div class="article-info">
                    <div class="article-author">{{ post.author.username }}</div>
                    <div class="article-created-date">{{ post.created_date }}</div>
                </div>
                <p class="article-text">{{ post.get_excerpt }}</p>
            </div>
        {% empty %}
            <p>Пока нет ни одной статьи.</p>
        {% endfor %}
    </div>
</body>
</html>
