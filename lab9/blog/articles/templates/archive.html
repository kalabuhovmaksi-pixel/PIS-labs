{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Архив всех статей</title>
    <link rel="stylesheet" href="{% static 'css/article.css' %}">
</head>
<body class="archive">

    <div class="header">
        <img src="{% static 'img/dpb-logo.jpg' %}" id="logo" alt="Logo">
        <h1>Django public blog</h1>

        <div class="auth-links">
            <a href="{% url 'login' %}">Вход</a>
            <a href="{% url 'register' %}">Регистрация</a>
        </div>
    </div>

    <div class="parallax-wrapper">
        <div class="parallax-layer layer-back"></div>
        <div class="parallax-layer layer-front"></div>

        <div class="archive-content">
            <a href="{% url 'create_post' %}">+ Новая статья</a>

            {% for post in posts %}
                <div class="one-post">
                    <div class="post-managment">
                        <h2 class="post-title">
                            <a href="{% url 'article' article_id=post.id %}">{{ post.title }}</a>
                        </h2>
                        <p class="fold-button">Свернуть</p>
                    </div>
                    <div class="article-info">
                        <div class="article-author">{{ post.author.username }}</div>
                        <div class="article-created-date">{{ post.created_date }}</div>
                    </div>
                    <p class="article-text">{{ post.get_excerpt }}</p>
                    <div class="one-post-shadow"></div>
                </div>
            {% empty %}
                <p>Пока нет ни одной статьи.</p>
            {% endfor %}
        </div>
    </div>

    <script src="{% static 'js/jquery.js' %}"></script>
    <script src="{% static 'js/highlight-post.js' %}"></script>
    <script src="{% static 'js/logo-zoom.js' %}"></script>
    <script src="{% static 'js/parallax.js' %}"></script>
</body>
</html>
